# Example XAgent project configuration
# Copy relevant values into .xagent/config.yaml if you want a fresh local config.
default_model: "ep-your-ark-endpoint-id"
max_model_calls: 100
# Supported log levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: "WARNING"
models:
  - name: "ep-your-ark-endpoint-id"
    provider: "ark"
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: ""
feishu:
  app_id: ""
  app_secret: ""
  api_base_url: "https://open.feishu.cn"
  bot_open_id: ""
  group_mode: "mention_only"
  allow_all: false
  allowed_user_ids: []
  allowed_chat_ids: []
  reconnect_initial_seconds: 1.0
  reconnect_cap_seconds: 30.0
  partial_emit_chars: 32
  deny_message: "Access denied."
